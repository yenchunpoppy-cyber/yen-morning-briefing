<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yen 每日早報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
:root{
  --orchid:     #7B6B99;
  --orchid-med: #A994C4;
  --orchid-lt:  #D8CCF0;
  --orchid-pale:#F4F0FC;
  --orchid-bg:  #EDE7F9;
  --sage:       #4E7260;
  --sage-lt:    #B4CFBE;
  --sage-pale:  #EDF5F0;
  --amber:      #8B6B3D;
  --amber-lt:   #D4B896;
  --amber-pale: #FBF0E2;
  --ink:        #2A2218;
  --ink-2:      #4A3F32;
  --cream:      #FFFDF9;
  --parchment:  #F7F2EA;
  --page-bg:    #F5EFE6;
  --border:     #E2D9CC;
  --border-lt:  #EEE8DF;
  --text-1:     #2A2218;
  --text-2:     #4A3F32;
  --text-3:     #8A7E70;
  --sidebar-w:  270px;
  --serif: 'Noto Serif TC', 'Georgia', serif;
  --sans:  'Noto Sans TC', -apple-system, sans-serif;
}
body{font-family:var(--sans);background:var(--page-bg);color:var(--text-1);font-size:17px;line-height:1.75;min-height:100vh;}
a{color:var(--orchid);text-decoration:none;}
h1,h2,h3{font-family:var(--serif);}
