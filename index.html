.sb-sub{font-size:12px;color:var(--t3);letter-spacing:2px}

.hdr-title{font-family:var(--serif);font-size:33px;font-weight:600;color:var(--ink);letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.hdr-date{font-size:16px;color:var(--t2);margin-bottom:1.25rem}

/* ââ Section nav ââ */

/* ââ Article ââ */

.bl-list{list-style:none}

  padding:.85rem 1rem;border-radius:10px;
  border:1px solid var(--borderl);background:var(--parchment);
  margin-bottom:8px;cursor:grab;transition:background .15s,opacity .15s;
  position:relative

.bl-item:hover{background:var(--orchid-pale);border-color:var(--orchid-lt)}
.bl-item.done{opacity:.55}
.bl-item.done .bl-text{text-decoration:line-through;color:var(--t3)}

.bl-item.drag-over{border-color:var(--orchid-med);background:var(--orchid-pale)}

.bl-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--orchid-lt);background:#fff;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;position:relative;transition:all .15s}
.bl-cb:checked{background:var(--orchid);border-color:var(--orchid)}
.bl-cb:checked::after{content:'â';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:13px;font-weight:700}
.bl-text{font-size:19px;color:var(--t2);flex:1;line-height:1.5}
.bl-del{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:2px 4px;border-radius:4px;opacity:0;transition:opacity .15s;flex-shrink:0;line-height:1}
.bl-item:hover .bl-del{opacity:1}
.bl-del:hover{color:var(--amber);background:var(--amber-pale)}
.bl-hint{font-size:14px;color:var(--t3);text-align:center;padding:1.5rem 0;display:none}

.footer{font-size:14px;color:var(--t3);text-align:center;padding:2rem 0 2.5rem;border-top:1px solid var(--borderl);margin-top:1rem}

  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .mob-hdr{display:flex}
  .main{margin-left:0}
  .c-hdr{padding:1.75rem 1.5rem 1.5rem}
  .hdr-title{font-size:26px}
  .hdr-deco{display:none}
  .sec-nav{padding:0 1.5rem}
  .article{padding:1.75rem 1.5rem 3rem}
  .card{padding:1.25rem 1.3rem}
  .cttl{font-size:20px}
  .cbody{font-size:17px}
  .en-grid{grid-template-columns:1fr 1fr}
  .qt-wrap{padding:1.5rem}
  .qt-txt{font-size:20px}
  .grid2{grid-template-columns:1fr}
  .sch-tbl th:last-child,.sch-tbl td:last-child{display:none}
}
@media(max-width:480px){
  .en-grid{grid-template-columns:1fr}
}
</style>

// ââ Bucket list logic ââ
function getTodos(){
  try{ const s=localStorage.getItem('yen-todos'); return s?JSON.parse(s):null; }catch(e){return null;}
}
function saveTodos(items){ try{localStorage.setItem('yen-todos',JSON.stringify(items));}catch(e){} }
function initTodos(){
  let items=getTodos();
  if(!items){ items=DEFAULT_TODOS.map((t,i)=>({id:Date.now()+i,text:t,done:false})); saveTodos(items); }
  return items;
}

function renderBucket(){
  const items=initTodos();
  const list=document.getElementById('blList');
  if(!list)return;
  list.innerHTML='';
  items.forEach((item,idx)=>{
    const li=document.createElement('li');
    li.className='bl-item'+(item.done?' done':'');
    li.draggable=true;
    li.dataset.idx=idx;
    li.innerHTML=`<span class="bl-drag" title="ææ³æåº">â®â®</span>
      <input type="checkbox" class="bl-cb" ${item.done?'checked':''} onchange="toggleTodo(${item.id})">
      <span class="bl-text">${escHtml(item.text)}</span>
      <button class="bl-del" onclick="delTodo(${item.id})" title="åªé¤">â</button>`;
    // drag events
    li.addEventListener('dragstart',e=>{li.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',idx);});
    li.addEventListener('dragend',()=>{li.classList.remove('dragging');document.querySelectorAll('.bl-item').forEach(el=>el.classList.remove('drag-over'));});
    li.addEventListener('dragover',e=>{e.preventDefault();li.classList.add('drag-over');});
    li.addEventListener('dragleave',()=>li.classList.remove('drag-over'));
    li.addEventListener('drop',e=>{
      e.preventDefault();
      li.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=parseInt(li.dataset.idx);
      if(from===to)return;
      const items2=initTodos();
      const [moved]=items2.splice(from,1);
      items2.splice(to,0,moved);
      saveTodos(items2);
      renderBucket();
    });
    list.appendChild(li);
  });
  // hint if empty
  const hint=document.getElementById('blHint');
  if(hint) hint.style.display=items.length?'none':'block';
  // progress
  const done=items.filter(x=>x.done).length;
  const prog=document.getElementById('blProg');
  if(prog) prog.textContent=`å·²å®æ ${done} / ${items.length} é `;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleTodo(id){
  const items=initTodos();
  const item=items.find(x=>x.id===id);
  if(item){ item.done=!item.done; saveTodos(items); renderBucket(); }
}
function delTodo(id){
  const items=initTodos().filter(x=>x.id!==id);
  saveTodos(items); renderBucket();
}
function addTodo(){
  const inp=document.getElementById('blInp');
  const text=inp.value.trim();
  if(!text)return;
  const items=initTodos();
  items.push({id:Date.now(),text,done:false});
  saveTodos(items);
  inp.value='';
  renderBucket();
}
