<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yen 每日早報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
:root{
  --orchid:#7B6B99;--orchid-med:#A994C4;--orchid-lt:#D8CCF0;
  --orchid-pale:#F4F0FC;--orchid-bg:#EDE7F9;
  --sage:#4E7260;--sage-lt:#B4CFBE;--sage-pale:#EDF5F0;
  --amber:#8B6B3D;--amber-lt:#D4B896;--amber-pale:#FBF0E2;
  --ink:#2A2218;--ink2:#3D3327;
  --cream:#FFFDF9;--parchment:#F7F2EA;--page:#F5EFE6;
  --border:#E2D9CC;--borderl:#EEE8DF;
  --t1:#2A2218;--t2:#4A3F32;--t3:#8A7E70;
  --sw:270px;
  --serif:'Noto Serif TC','Georgia',serif;
  --sans:'Noto Sans TC',-apple-system,sans-serif
}
body{font-family:var(--sans);background:var(--page);color:var(--t1);font-size:20px;line-height:1.75;min-height:100vh}
a{color:var(--orchid);text-decoration:none}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sw);min-height:100vh;background:var(--cream);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto
}
.sb-brand{padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--borderl)}
.sb-icon{width:42px;height:42px;margin-bottom:10px;display:block}
.sb-title{font-family:var(--serif);font-size:18px;color:var(--ink);letter-spacing:.5px;margin-bottom:3px}
.sb-sub{font-size:12px;color:var(--t3);letter-spacing:2px}
.sb-lbl{font-size:11px;letter-spacing:2.5px;color:var(--t3);padding:1.25rem 1.5rem .5rem;font-weight:500}
.date-list{padding:0 .75rem 1rem}
.di{display:block;padding:.65rem .75rem;border-radius:8px;cursor:pointer;color:var(--t2);font-size:15px;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.di:hover{background:var(--orchid-pale)}
.di.active{background:var(--orchid-bg);color:var(--orchid)}
.di .dim{display:block;font-size:15px;font-weight:500}
.di .dis{display:block;font-size:13px;color:var(--t3);margin-top:1px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90}
.main{margin-left:var(--sw);flex:1;min-height:100vh}
.mob-hdr{
  display:none;background:var(--cream);border-bottom:1px solid var(--border);
  padding:.85rem 1.25rem;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50
}
.mob-menu{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink);line-height:1}
.mob-title{font-family:var(--serif);font-size:17px;flex:1;color:var(--ink)}
.mob-nav{display:flex;gap:6px}
.mob-nav button{background:var(--orchid-pale);border:1px solid var(--orchid-lt);color:var(--orchid);border-radius:6px;width:34px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── Content Header ── */
.c-hdr{background:var(--cream);border-bottom:1px solid var(--border);padding:2.5rem 3rem 2rem;position:relative;overflow:hidden}
.hdr-deco{position:absolute;right:0;top:0;bottom:0;width:220px;opacity:.45;pointer-events:none}
.hdr-eye{font-size:12px;letter-spacing:3px;color:var(--orchid-med);margin-bottom:10px}
.hdr-title{font-family:var(--serif);font-size:33px;font-weight:600;color:var(--ink);letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
.hdr-date{font-size:16px;color:var(--t2);margin-bottom:1.25rem}
.hdr-pills{display:flex;gap:8px;flex-wrap:wrap}
.hdr-pill{font-size:13px;padding:4px 15px;border-radius:30px;border:1px solid var(--orchid-lt);color:var(--orchid);background:var(--orchid-pale);letter-spacing:.5px}

/* ── Section nav ── */
.sec-nav{background:var(--cream);border-bottom:1px solid var(--border);padding:0 3rem;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:40}
.sn-btn{font-size:14px;color:var(--t3);padding:.9rem 1rem;border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.sn-btn:hover{color:var(--orchid)}
.sn-btn.active{color:var(--orchid);border-bottom-color:var(--orchid)}

/* ── Article ── */
.article{padding:2.5rem 3rem 4rem;max-width:840px}

/* ── Section ── */
.section{margin-bottom:3.5rem}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:.85rem;border-bottom:1.5px solid var(--borderl)}
.sec-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-num{font-size:12px;letter-spacing:2.5px;color:var(--orchid)}
.sec-ttl{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--ink)}
.sec-meta{font-size:13px;color:var(--t3);margin-left:auto}

/* ── Cards ── */
.card{background:var(--cream);border:1px solid var(--borderl);border-radius:14px;padding:1.6rem 1.75rem;margin-bottom:12px}
.ctags{margin-bottom:10px}
.tag{display:inline-block;font-size:12px;letter-spacing:.5px;padding:3px 12px;border-radius:30px;margin-right:6px;font-weight:500}
.tag-o{background:var(--orchid-bg);color:var(--orchid)}
.tag-s{background:var(--sage-pale);color:var(--sage)}
.tag-a{background:var(--amber-pale);color:var(--amber)}
.cttl{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--ink);margin-bottom:10px;line-height:1.4}
.cbody{font-size:19px;color:var(--t2);line-height:1.85}
.cyou{margin-top:12px;padding:.9rem 1.1rem;background:var(--orchid-pale);border-radius:8px;border-left:3px solid var(--orchid-med);font-size:17px;color:var(--orchid);line-height:1.75}
.cyou-lbl{font-size:12px;letter-spacing:1.5px;color:var(--orchid-med);margin-bottom:4px;font-weight:500}
.clink{display:inline-block;margin-top:14px;font-size:14px;color:var(--orchid);border-bottom:1px solid var(--orchid-lt);padding-bottom:2px}
.clink:hover{border-color:var(--orchid)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}

/* ── Stock ── */
.alert-box{background:var(--amber-pale);border:1px solid var(--amber-lt);border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.alert-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.alert-lbl{font-size:12px;letter-spacing:2px;font-weight:500;color:var(--amber);margin-bottom:6px}
.alert-item{font-size:19px;color:var(--ink2);padding:2px 0}
.stbl{width:100%;border-collapse:collapse;font-size:19px}
.stbl th{font-size:13px;letter-spacing:1px;color:var(--t3);font-weight:500;text-align:left;padding:7px 14px;border-bottom:1px solid var(--border)}
.stbl td{padding:11px 14px;border-bottom:1px solid var(--borderl);color:var(--t2)}
.stbl tr:last-child td{border-bottom:none}
.stbl td:first-child{color:var(--ink);font-weight:500}
.chip{font-size:13px;padding:3px 11px;border-radius:20px}
.chip-s{background:var(--sage-pale);color:var(--sage)}
.chip-a{background:var(--amber-pale);color:var(--amber)}

/* ── Energy ── */
.en-wrap{background:var(--cream);border:1px solid var(--orchid-lt);border-radius:16px;padding:2rem;position:relative;overflow:hidden}
.en-deco{position:absolute;right:-10px;top:-10px;opacity:.1;pointer-events:none}
.gz-lbl{font-size:12px;letter-spacing:2.5px;color:var(--orchid-med);margin-bottom:6px}
.gz-disp{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--orchid);letter-spacing:5px;margin-bottom:5px}
.gz-hint{font-size:15px;color:var(--t3);margin-bottom:1.5rem}
.en-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:1.25rem}
.en-item{background:var(--orchid-pale);border-radius:10px;border:1px solid var(--orchid-lt);padding:1.1rem 1.2rem}
.en-lbl{font-size:12px;letter-spacing:1.5px;color:var(--orchid);font-weight:500;margin-bottom:7px}
.en-txt{font-size:17px;color:var(--t2);line-height:1.75}
.act-box{background:var(--orchid-pale);border-radius:10px;border:1px solid var(--orchid-lt);border-left:4px solid var(--orchid-med);border-top-left-radius:0;border-bottom-left-radius:0;padding:1.1rem 1.4rem}
.act-lbl{font-size:12px;letter-spacing:2px;color:var(--orchid);font-weight:500;margin-bottom:7px}
.act-txt{font-family:var(--serif);font-size:20px;color:var(--ink);line-height:1.65}
.act-sub{font-size:15px;color:var(--t3);margin-top:5px}

/* ── Schedule ── */
.sch-tbl{width:100%;border-collapse:collapse}
.sch-tbl th{font-size:13px;letter-spacing:1px;color:var(--t3);font-weight:500;text-align:left;padding:7px 14px;border-bottom:1px solid var(--border)}
.sch-tbl td{padding:13px 14px;border-bottom:1px solid var(--borderl);vertical-align:top}
.sch-tbl tr:last-child td{border-bottom:none}
.st{font-size:14px;color:var(--orchid);font-weight:500;white-space:nowrap;width:120px}
.sa{font-family:var(--serif);font-size:19px;color:var(--ink);margin-bottom:3px}
.sn{font-size:14px;color:var(--t3)}
.se{font-size:14px;color:var(--t3)}

/* ── Warn ── */
.warn{background:var(--amber-pale);border:1px solid var(--amber-lt);border-radius:10px;padding:1rem 1.3rem;margin-bottom:14px;font-size:17px;color:var(--amber)}

/* ── Quote ── */
.qt-wrap{background:var(--orchid-pale);border:1px solid var(--orchid-lt);border-radius:16px;padding:2.25rem 2.5rem;position:relative;overflow:hidden}
.qt-deco{position:absolute;right:0;bottom:0;opacity:.1;pointer-events:none}
.qt-eye{font-size:12px;letter-spacing:3px;color:var(--orchid-med);margin-bottom:1.25rem}
.qt-txt{font-family:var(--serif);font-size:23px;color:var(--ink);line-height:2;letter-spacing:.3px}
.qt-from{font-size:13px;color:var(--t3);margin-top:1.25rem}

/* ── Bucket List ── */
.bucket-wrap{background:var(--cream);border:1px solid var(--borderl);border-radius:14px;padding:1.75rem}
.bl-add{display:flex;gap:10px;margin-bottom:1.25rem}
.bl-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:.65rem 1rem;font-family:var(--sans);font-size:17px;color:var(--ink);background:var(--parchment);outline:none;transition:border-color .15s}
.bl-inp:focus{border-color:var(--orchid-med)}
.bl-add-btn{background:var(--orchid);color:#fff;border:none;border-radius:8px;padding:.65rem 1.25rem;font-family:var(--sans);font-size:17px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.bl-add-btn:hover{opacity:.85}
.bl-list{list-style:none}
.bl-item{
  display:flex;align-items:center;gap:12px;
  padding:.85rem 1rem;border-radius:10px;
  border:1px solid var(--borderl);background:var(--parchment);
  margin-bottom:8px;cursor:grab;transition:background .15s,opacity .15s;
  position:relative
}
.bl-item:hover{background:var(--orchid-pale);border-color:var(--orchid-lt)}
.bl-item.done{opacity:.55}
.bl-item.done .bl-text{text-decoration:line-through;color:var(--t3)}
.bl-item.dragging{opacity:.4;cursor:grabbing}
.bl-item.drag-over{border-color:var(--orchid-med);background:var(--orchid-pale)}
.bl-drag{color:var(--t3);font-size:18px;cursor:grab;flex-shrink:0;user-select:none;line-height:1}
.bl-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--orchid-lt);background:#fff;cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;position:relative;transition:all .15s}
.bl-cb:checked{background:var(--orchid);border-color:var(--orchid)}
.bl-cb:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:13px;font-weight:700}
.bl-text{font-size:19px;color:var(--t2);flex:1;line-height:1.5}
.bl-del{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:2px 4px;border-radius:4px;opacity:0;transition:opacity .15s;flex-shrink:0;line-height:1}
.bl-item:hover .bl-del{opacity:1}
.bl-del:hover{color:var(--amber);background:var(--amber-pale)}
.bl-hint{font-size:14px;color:var(--t3);text-align:center;padding:1.5rem 0;display:none}

/* ── Footer ── */
.footer{font-size:14px;color:var(--t3);text-align:center;padding:2rem 0 2.5rem;border-top:1px solid var(--borderl);margin-top:1rem}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.open{display:block}
  .mob-hdr{display:flex}
  .main{margin-left:0}
  .c-hdr{padding:1.75rem 1.5rem 1.5rem}
  .hdr-title{font-size:26px}
  .hdr-deco{display:none}
  .sec-nav{padding:0 1.5rem}
  .article{padding:1.75rem 1.5rem 3rem}
  .card{padding:1.25rem 1.3rem}
  .cttl{font-size:20px}
  .cbody{font-size:17px}
  .en-grid{grid-template-columns:1fr 1fr}
  .qt-wrap{padding:1.5rem}
  .qt-txt{font-size:20px}
  .grid2{grid-template-columns:1fr}
  .sch-tbl th:last-child,.sch-tbl td:last-child{display:none}
}
@media(max-width:480px){
  .en-grid{grid-template-columns:1fr}
}
</style>
</head>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">

    <button class="di" onclick="showBucket()" style="font-size:15px">✨ 想做的事清單</button>
  </div>
</aside>

<div class="sb-overlay" id="overlay" onclick="closeSB()"></div>

<!-- Main -->
<main class="main">
  <div class="mob-hdr">
    <button class="mob-menu" onclick="openSB()">☰</button>
    <div class="mob-title">每日早報</div>
    <div class="mob-nav">
      <button onclick="prevDay()">‹</button>
      <button onclick="nextDay()">›</button>
    </div>
  </div>
  <div id="pageContent"></div>
</main>
</div>

// ── Bucket list logic ──
function getTodos(){
  try{ const s=localStorage.getItem('yen-todos'); return s?JSON.parse(s):null; }catch(e){return null;}
}
function saveTodos(items){ try{localStorage.setItem('yen-todos',JSON.stringify(items));}catch(e){} }
function initTodos(){
  let items=getTodos();
  if(!items){ items=DEFAULT_TODOS.map((t,i)=>({id:Date.now()+i,text:t,done:false})); saveTodos(items); }
  return items;
}

function renderBucket(){
  const items=initTodos();
  const list=document.getElementById('blList');
  if(!list)return;
  list.innerHTML='';
  items.forEach((item,idx)=>{
    const li=document.createElement('li');
    li.className='bl-item'+(item.done?' done':'');
    li.draggable=true;
    li.dataset.idx=idx;
    li.innerHTML=`<span class="bl-drag" title="拖曳排序">⋮⋮</span>
      <input type="checkbox" class="bl-cb" ${item.done?'checked':''} onchange="toggleTodo(${item.id})">
      <span class="bl-text">${escHtml(item.text)}</span>
      <button class="bl-del" onclick="delTodo(${item.id})" title="刪除">✕</button>`;
    // drag events
    li.addEventListener('dragstart',e=>{li.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',idx);});
    li.addEventListener('dragend',()=>{li.classList.remove('dragging');document.querySelectorAll('.bl-item').forEach(el=>el.classList.remove('drag-over'));});
    li.addEventListener('dragover',e=>{e.preventDefault();li.classList.add('drag-over');});
    li.addEventListener('dragleave',()=>li.classList.remove('drag-over'));
    li.addEventListener('drop',e=>{
      e.preventDefault();
      li.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=parseInt(li.dataset.idx);
      if(from===to)return;
      const items2=initTodos();
      const [moved]=items2.splice(from,1);
      items2.splice(to,0,moved);
      saveTodos(items2);
      renderBucket();
    });
    list.appendChild(li);
  });
  // hint if empty
  const hint=document.getElementById('blHint');
  if(hint) hint.style.display=items.length?'none':'block';
  // progress
  const done=items.filter(x=>x.done).length;
  const prog=document.getElementById('blProg');
  if(prog) prog.textContent=`已完成 ${done} / ${items.length} 項`;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleTodo(id){
  const items=initTodos();
  const item=items.find(x=>x.id===id);
  if(item){ item.done=!item.done; saveTodos(items); renderBucket(); }
}
function delTodo(id){
  const items=initTodos().filter(x=>x.id!==id);
  saveTodos(items); renderBucket();
}
function addTodo(){
  const inp=document.getElementById('blInp');
  const text=inp.value.trim();
  if(!text)return;
  const items=initTodos();
  items.push({id:Date.now(),text,done:false});
  saveTodos(items);
  inp.value='';
  renderBucket();
}
